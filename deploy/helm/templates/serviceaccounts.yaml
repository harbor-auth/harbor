{{- if .Values.serviceAccount.create }}
# Dedicated ServiceAccounts, one per binary. Neither harbor-hot nor harbor-mgmt
# calls the Kubernetes API, so both disable token automounting: a compromised
# pod then holds NO usable K8s API token, shrinking lateral-movement blast
# radius.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "harbor.hot.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "harbor.hot.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "harbor.mgmt.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "harbor.mgmt.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
