{{- if .Values.migrate.enabled }}
# Job: harbor-migrate — applies pending DB schema migrations before the app
# pods start, so harbor-hot / harbor-mgmt never boot against a stale schema.
#
# Lifecycle:
#   * Pure Helm:   helm.sh/hook pre-install,pre-upgrade fires before all normal
#     resources, and hook-delete-policy cleans it up on success.
#   * ArgoCD:      ArgoCD does not run Helm's hook machinery. Instead it reads
#     argocd.argoproj.io/hook: PreSync and runs the Job before the sync wave.
#     Both annotations are present so the chart works in either context.
# Failed Jobs are deliberately NOT deleted (hook-delete-policy omits "hook-failed")
# so operators can inspect logs via `kubectl logs -n harbor job/harbor-migrate`.
# The Job is removed by `before-hook-creation` on the next deploy attempt.
#
# Idempotent: golang-migrate records the applied version in a schema_migrations
# table and no-ops when already current, so re-running on every deploy is safe.
#
# NOTE: it deliberately uses the namespace 'default' ServiceAccount (with token
# automounting off) — the chart's own ServiceAccounts are ordinary resources
# that don't exist yet when this pre-install hook fires on a fresh install, and
# the migrator never talks to the Kubernetes API anyway.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "harbor.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "harbor.migrate.labels" . | nindent 4 }}
  annotations:
    # Helm: run before install/upgrade, early in the hook order, and clean up.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    # ArgoCD: run as a PreSync hook and delete on success.
    "argocd.argoproj.io/hook": PreSync
    "argocd.argoproj.io/hook-delete-policy": HookSucceeded
spec:
  # With restartPolicy: Never, Kubernetes creates a new Pod per retry attempt.
  # Total Pod attempts = backoffLimit + 1 (see values.yaml for the default).
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  # Hard ceiling so a wedged migration fails the deploy rather than hanging it.
  activeDeadlineSeconds: {{ .Values.migrate.activeDeadlineSeconds }}
  # Safety net: auto-delete finished Jobs when run outside Helm hook context
  # (e.g. raw kubectl apply). Helm's hook-delete-policy takes precedence when
  # the chart is applied normally.
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "harbor.migrate.labels" . | nindent 8 }}
    spec:
      # Fresh pod per retry so each attempt's logs are self-contained.
      restartPolicy: Never
      # The migrator does not call the K8s API; the 'default' SA is used only
      # because the chart's SAs may not exist yet during a pre-install hook.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: {{ include "harbor.migrate.image" . }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          # $(DATABASE_URL) is substituted by the kubelet before exec, so the
          # resolved DSN appears in the process arg list. The risk is low — the
          # container is single-process, unprivileged, and short-lived — but
          # prefer this over a shell wrapper which would add a shell layer.
          args:
            - "-path"
            - "/migrations"
            - "-database"
            - "$(DATABASE_URL)"
            - "up"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "harbor.migrate.secretName" . }}
                  key: DATABASE_URL
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # readOnlyRootFilesystem blocks image-fs writes; give migrate a
          # writable scratch dir for any temp files.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
