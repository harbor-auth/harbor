# Deployment: harbor-hot — the stateless, internet-facing OIDC hot path
# (/authorize, /token, /jwks, discovery). Stateless by design, so it scales
# horizontally freely — replica count is driven by the HPA (hpa-hot.yaml); the
# replicaCount here is only the initial/floor value.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "harbor.fullname" . }}-hot
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "harbor.hot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.hot.replicaCount }}
  selector:
    matchLabels:
      {{- include "harbor.hot.selectorLabels" . | nindent 6 }}
  # RollingUpdate keeps the OIDC endpoints available during a deploy; combined
  # with the PDB and preStop drain below, in-flight /token exchanges are not
  # dropped.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "harbor.hot.labels" . | nindent 8 }}
    spec:
      # Dedicated SA with no auto-mounted API token (harbor-hot never calls the
      # K8s API).
      serviceAccountName: {{ include "harbor.hot.serviceAccountName" . }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      # Spread replicas across availability zones so a single-AZ outage cannot
      # take sign-in down. DoNotSchedule enforces the spread hard.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "harbor.hot.selectorLabels" . | nindent 14 }}
      containers:
        - name: harbor-hot
          image: {{ include "harbor.hot.image" . }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.hot.port }}
          # Non-secret config first, then secrets (DATABASE_URL/REDIS_URL/
          # KEK_SECRET). envFrom keeps the two sources cleanly separated.
          envFrom:
            - configMapRef:
                name: {{ include "harbor.fullname" . }}-hot-config
            - secretRef:
                name: {{ include "harbor.hot.secretName" . }}
          # Liveness restarts a wedged process; readiness gates traffic. Both
          # hit /healthz. Readiness is tighter so a briefly-unhealthy pod is
          # pulled from the Service before it's killed.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          lifecycle:
            preStop:
              # Sleep so the pod is removed from Service endpoints BEFORE the
              # process gets SIGTERM, draining in-flight requests. Must be
              # shorter than terminationGracePeriodSeconds.
              exec:
                command: ["/bin/sleep", "5"]
          resources:
            {{- toYaml .Values.hot.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # readOnlyRootFilesystem blocks all writes to the image fs; Go's
          # os.TempDir() defaults to /tmp, so give it a writable scratch mount.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
