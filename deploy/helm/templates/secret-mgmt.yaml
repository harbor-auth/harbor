{{- if not .Values.mgmt.secrets.existingSecret }}
# Secret for harbor-mgmt (the cold-path enrollment / passkey / dashboard BFF).
#
# SCAFFOLD: prefer mgmt.secrets.existingSecret in production.
#
#   DATABASE_URL      — regional Postgres DSN. Enrollment writes user DEKs here.
#   HARBOR_KEK_SECRET — seals enrolled users' pairwise-secret DEKs. FATAL if
#                       unset when DATABASE_URL is set.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "harbor.mgmt.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "harbor.mgmt.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.mgmt.secrets.databaseUrl | quote }}
  HARBOR_KEK_SECRET: {{ .Values.mgmt.secrets.kekSecret | quote }}
{{- end }}
