{{- if .Values.hot.networkPolicy.enabled }}
# NetworkPolicy: harbor-hot is internet-facing via Ingress but should only
# receive traffic FROM the Ingress controller, not from arbitrary cluster pods.
# Egress is locked to only what hot needs: Redis, Postgres, and DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "harbor.fullname" . }}-hot
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "harbor.hot.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "harbor.hot.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        # Allow traffic from the ingress controller namespace.
        # SCAFFOLD: adjust hot.networkPolicy.ingressControllerNamespace to match
        # your ingress controller's actual namespace name label.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.hot.networkPolicy.ingressControllerNamespace }}
      ports:
        - port: {{ .Values.hot.port }}
          protocol: TCP
  egress:
    # DNS (kube-dns / CoreDNS).
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Redis — auth-code TTL store. REQUIRED for multi-replica.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - port: 6379
          protocol: TCP
    # Regional PostgreSQL.
    # SCAFFOLD: podSelector only matches same-namespace postgres pods. If your
    # DB is in another namespace or is managed/external, replace with an ipBlock
    # or add a namespaceSelector — otherwise this egress rule silently blocks.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - port: 5432
          protocol: TCP
{{- end }}
