{{- if not .Values.hot.secrets.existingSecret }}
# Secret for harbor-hot (the internet-facing OIDC hot path).
#
# SCAFFOLD: prefer hot.secrets.existingSecret pointing at a
# secrets-manager-provisioned Secret (Vault / External Secrets Operator) over
# committing values through Helm.
#
#   DATABASE_URL — regional Postgres DSN.
#   REDIS_URL    — auth-code TTL store. REQUIRED for multi-replica.
#   KEK_SECRET   — wraps per-user pairwise-secret DEKs. FATAL if unset when
#                  DATABASE_URL is set.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "harbor.hot.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "harbor.hot.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.hot.secrets.databaseUrl | quote }}
  REDIS_URL: {{ .Values.hot.secrets.redisUrl | quote }}
  KEK_SECRET: {{ .Values.hot.secrets.kekSecret | quote }}
{{- end }}
