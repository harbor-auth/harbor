# Production Helm value overrides for the single-node RKE2 deployment
# (ns31170412 / auth.harborauth.com), consumed by the ArgoCD Application
# in this directory.
#
# global.image.tag is pinned automatically by .github/workflows/publish.yml on
# every push to main. Do not edit it manually — CI overwrites it with the
# immutable commit SHA of the images it just built.

global:
  image:
    registry: ghcr.io/harbor-auth/harbor
    tag: 4edd2988c6f7
    pullPolicy: IfNotPresent
# Single-region dev/prod: binds the issuer / RP-origin hosts to a region so the
# fail-closed region middleware resolves them instead of 400-rejecting.
region: EU
hot:
  # Single node — one replica. HPA/PDB are meaningless here and are disabled.
  replicaCount: 1
  issuer: https://auth.harborauth.com
  hpa:
    enabled: false
  pdb:
    enabled: false
  networkPolicy:
    # RKE2 ships the nginx ingress controller in kube-system, not ingress-nginx.
    ingressControllerNamespace: kube-system
  # Reference the Secret provisioned out-of-band in the harbor namespace
  # (DATABASE_URL / REDIS_URL / KEK_SECRET) rather than committing credentials.
  secrets:
    existingSecret: harbor-hot-secrets
mgmt:
  replicaCount: 1
  webauthn:
    rpId: auth.harborauth.com
    rpName: Harbor
    rpOrigin: https://auth.harborauth.com
  pdb:
    enabled: false
  secrets:
    existingSecret: harbor-mgmt-secrets
ingress:
  enabled: true
  className: nginx
  host: auth.harborauth.com
  # Provisioned by cert-manager (Let's Encrypt) into the harbor namespace.
  tlsSecretName: harbor-tls
# migrate Job uses harbor-hot's Secret by default (shares the same DATABASE_URL).
# The DB user must have DDL privileges (CREATE/ALTER TABLE). Set
# migrate.enabled=false to manage schema migrations out-of-band.
#
# ONE-TIME BOOTSTRAP (first automated deploy after manual psql seed):
# The prod DB was seeded via raw psql, which did NOT create golang-migrate's
# schema_migrations bookkeeping table. Before the first ArgoCD sync that includes
# the migrate Job, run:
#   DB=$(kubectl get secret harbor-hot-secrets -n harbor -o jsonpath='{.data.DATABASE_URL}' | base64 -d)
#   kubectl exec -n harbor harbor-postgresql-0 -- psql "$DB" -c \
#     "CREATE TABLE IF NOT EXISTS schema_migrations (version bigint NOT NULL PRIMARY KEY, dirty boolean NOT NULL);"
#   kubectl exec -n harbor harbor-postgresql-0 -- psql "$DB" -c \
#     "INSERT INTO schema_migrations VALUES (16, false) ON CONFLICT DO NOTHING;"
# After that one-time step every subsequent deploy is fully automated.
# migrate:
#   secrets:
#     existingSecret: harbor-hot-secrets   # default; explicit override not needed
# The harbor namespace already exists (created by the initial install); ArgoCD
# manages resources inside it but must not try to re-create it.
namespace:
  create: false
