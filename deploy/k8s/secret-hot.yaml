# Secret for harbor-hot (the internet-facing OIDC hot path).
#
# SCAFFOLD: the values below are base64-encoded PLACEHOLDERS and MUST be
# replaced before any real deployment. In production these should be injected
# by a secrets manager (Vault / cloud KMS / External Secrets Operator), NOT
# committed to git. This file exists as a shape reference only.
#
# Kept in a SEPARATE Secret from harbor-mgmt so RBAC can scope each binary's
# service account to only the credentials it needs (least privilege).
#
#   DATABASE_URL — regional Postgres DSN. harbor-hot reads clients/grants/
#                  sessions/secrets from here (docs/DESIGN.md §10).
#   REDIS_URL    — auth-code TTL store. REQUIRED for multi-replica: without it
#                  auth codes live in-process and cross-replica /token fails
#                  (see cmd/harbor-hot/main.go).
#   KEK_SECRET   — wraps per-user pairwise-secret DEKs. FATAL if unset when
#                  DATABASE_URL is set. Rotate via docs/plans/signing-key-rotation.md.
apiVersion: v1
kind: Secret
metadata:
  name: harbor-hot-secrets
  namespace: harbor
  labels:
    app.kubernetes.io/name: harbor-hot
    app.kubernetes.io/part-of: harbor
type: Opaque
stringData:
  # REPLACE all three below with real values from your secrets manager.
  DATABASE_URL: "postgres://harbor_hot:REPLACE_ME@postgres.harbor.svc:5432/harbor?sslmode=require"
  REDIS_URL: "redis://:REPLACE_ME@redis.harbor.svc:6379/0"
  # 256-bit hex (or base64) key-encryption-key. Generate: openssl rand -hex 32
  KEK_SECRET: "REPLACE_ME_WITH_A_256_BIT_HEX_KEK"
