# Dedicated ServiceAccounts, one per binary. Neither harbor-hot nor harbor-mgmt
# calls the Kubernetes API, so both disable token automounting: a compromised
# pod then holds NO usable K8s API token, shrinking lateral-movement blast
# radius. Separate SAs (rather than the shared 'default') also let you bind
# minimal Roles per-binary later if either ever needs cluster access.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-hot-sa
  namespace: harbor
  labels:
    app.kubernetes.io/name: harbor-hot
    app.kubernetes.io/part-of: harbor
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-mgmt-sa
  namespace: harbor
  labels:
    app.kubernetes.io/name: harbor-mgmt
    app.kubernetes.io/part-of: harbor
automountServiceAccountToken: false
