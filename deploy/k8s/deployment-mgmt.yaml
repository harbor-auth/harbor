# Deployment: harbor-mgmt — the cold-path management binary (passkey ceremonies,
# user enrollment, dashboard/BFF, consent/audit). NOT internet-facing: reached
# only via the cluster-internal Service (service-mgmt.yaml) and locked down by
# NetworkPolicy (networkpolicy-mgmt.yaml). Lower replica count than hot — it is
# not on the token-verification critical path.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harbor-mgmt
  namespace: harbor
  labels:
    app.kubernetes.io/name: harbor-mgmt
    app.kubernetes.io/part-of: harbor
    app.kubernetes.io/component: cold-path
spec:
  # Pinned to 1 until the ceremony/session store is DB-backed: harbor-mgmt uses
  # in-memory WebAuthn state that does not survive restarts or cross-pod routing,
  # so a passkey ceremony begun on one pod would fail when finished on another.
  # See docs/plans/user-enrollment.md.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: harbor-mgmt
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: harbor-mgmt
        app.kubernetes.io/part-of: harbor
        app.kubernetes.io/component: cold-path
    spec:
      # Dedicated SA with no auto-mounted API token (harbor-mgmt never calls the
      # K8s API) — see serviceaccounts.yaml.
      serviceAccountName: harbor-mgmt-sa
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: harbor-mgmt
      containers:
        - name: harbor-mgmt
          # SCAFFOLD: pin to an immutable digest before production (see hot).
          image: ghcr.io/harbor-auth/harbor/harbor-mgmt:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          # No REDIS_URL here: harbor-mgmt does not use the auth-code store.
          # Config (incl. WEBAUTHN_RP_*) then secrets (DATABASE_URL/
          # HARBOR_KEK_SECRET).
          envFrom:
            - configMapRef:
                name: harbor-mgmt-config
            - secretRef:
                name: harbor-mgmt-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sleep", "5"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
