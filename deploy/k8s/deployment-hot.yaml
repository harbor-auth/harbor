# Deployment: harbor-hot — the stateless, internet-facing OIDC hot path
# (/authorize, /token, /jwks, discovery). Stateless by design (owns no mutable
# PII state), so it scales horizontally freely — replica count is driven by the
# HPA (hpa-hot.yaml); the 3 here is only the initial/floor value.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harbor-hot
  namespace: harbor
  labels:
    app.kubernetes.io/name: harbor-hot
    app.kubernetes.io/part-of: harbor
    app.kubernetes.io/component: hot-path
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: harbor-hot
  # RollingUpdate keeps the OIDC endpoints available during a deploy; combined
  # with the PDB (pdb-hot.yaml) and preStop drain below, in-flight /token
  # exchanges are not dropped.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: harbor-hot
        app.kubernetes.io/part-of: harbor
        app.kubernetes.io/component: hot-path
    spec:
      # Dedicated SA with no auto-mounted API token (harbor-hot never calls the
      # K8s API) — see serviceaccounts.yaml.
      serviceAccountName: harbor-hot-sa
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      # Spread replicas across availability zones so a single-AZ outage cannot
      # take sign-in down. DoNotSchedule enforces the spread hard (fail-closed
      # on scheduling) rather than best-effort.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: harbor-hot
      containers:
        - name: harbor-hot
          # SCAFFOLD: pin to an immutable digest (…@sha256:…) before production.
          # ':latest' defeats rollbacks and lets a re-pull silently change the
          # running binary.
          image: ghcr.io/harbor-auth/harbor/harbor-hot:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          # Non-secret config first, then secrets (DATABASE_URL/REDIS_URL/
          # KEK_SECRET). envFrom keeps the two sources cleanly separated.
          envFrom:
            - configMapRef:
                name: harbor-hot-config
            - secretRef:
                name: harbor-hot-secrets
          # Liveness restarts a wedged process; readiness gates traffic. Both
          # hit /healthz (served by the OpenAPI mux). Readiness is tighter so a
          # briefly-unhealthy pod is pulled from the Service before it's killed.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          lifecycle:
            preStop:
              # Sleep so the pod is removed from Service endpoints (and the LB
              # stops sending new requests) BEFORE the process gets SIGTERM,
              # draining in-flight /authorize and /token calls. Must be shorter
              # than terminationGracePeriodSeconds.
              exec:
                command: ["/bin/sleep", "5"]
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # readOnlyRootFilesystem blocks all writes to the image fs; Go's
          # os.TempDir() defaults to /tmp, so give it a writable scratch mount.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
