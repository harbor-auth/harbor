# Secret for harbor-mgmt (the cold-path enrollment / passkey / dashboard BFF).
#
# SCAFFOLD: base64/string PLACEHOLDERS — REPLACE before deployment and inject
# via a secrets manager in production (do not commit real values).
#
# Separate from harbor-hot-secrets so the mgmt service account never gets the
# hot-path KEK, and vice-versa (least privilege).
#
#   DATABASE_URL      — regional Postgres DSN. Enrollment writes user DEKs here.
#   HARBOR_KEK_SECRET — seals enrolled users' pairwise-secret DEKs. FATAL if
#                       unset when DATABASE_URL is set (cmd/harbor-mgmt/main.go).
apiVersion: v1
kind: Secret
metadata:
  name: harbor-mgmt-secrets
  namespace: harbor
  labels:
    app.kubernetes.io/name: harbor-mgmt
    app.kubernetes.io/part-of: harbor
type: Opaque
stringData:
  # REPLACE both below with real values from your secrets manager.
  DATABASE_URL: "postgres://harbor_mgmt:REPLACE_ME@postgres.harbor.svc:5432/harbor?sslmode=require"
  # 256-bit hex. Generate: openssl rand -hex 32
  HARBOR_KEK_SECRET: "REPLACE_ME_WITH_A_256_BIT_HEX_KEK_SECRET"
