schema: spec-driven
created: 2026-07-22
goal: Build a Go-native per-RP email relay (Hide-My-Email) — mint one opaque, unlinkable relay address <token>@relay.<region>.harbor.id per (user, RP) grant, store the relay_address→user→client_id mapping envelope-encrypted at rest and region-pinned (never cross-region replicated), and run a regional inbound MTA (emersion/go-smtp + go-msgauth, both MIT) that looks up the mapping, enforces SPF/DKIM/DMARC alignment, ARC-seals, and forwards to the user's real inbox with NO content retention; deactivation is an instant per-address hard-bounce kill switch independent of the RP login grant; abuse is contained by per-address rate limiting and aggregate-only per-RP volume — realising §7.5 with no external-SaaS callout on the inbound PII path
