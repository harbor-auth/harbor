# Harbor — Executable Invariants Registry (Foundation F1, the keystone).
#
# WHY THIS FILE EXISTS
# --------------------
# Harbor's security/privacy invariants (§A.8, §11.7, §6.5.7) otherwise live as
# prose in three places — DESIGN.md, code comments, and a reviewer's head — and
# a reviewer-LLM can silently miss a regression. This registry makes each
# invariant EXECUTABLE: every entry names the test(s) that enforce it, and the
# meta-test (`invariants/registry_test.go`) FAILS the build if any invariant
# lacks a live, tagged test. An invariant with no enforcing test is a bug.
#
# THE CONTRACT (enforced by registry_test.go)
# -------------------------------------------
#   1. Every entry has: id (^INV-[A-Z0-9-]+$), title, >=1 design_refs, >=1
#      enforced_by.
#   2. Every `enforced_by: [pkg:TestName]` names a REAL `func TestName(` under
#      that package (a *_test.go in internal/<pkg>).
#   3. Somewhere in the repo a `//harbor:invariant INV-XXX` comment tag physically
#      references each invariant id (put it on the enforcing test function).
#
# FORMAT (kept deliberately regular so the meta-test parses it without a YAML
# dependency): each list item is `- id:` followed by indented `title:`,
# `design_refs: [..]` (inline), `description:` (single line), and
# `enforced_by: [..]` (inline). Do not use folded/block scalars here.
#
# CHANGING AN INVARIANT is a security-relevant act: it must go through review
# (see CODEOWNERS on this path, Foundation F5). Weakening or deleting an entry
# without a corresponding DESIGN change is a red flag.

invariants:
  - id: INV-SIGN-ASYM-ONLY
    title: "Asymmetric-only token signing (ES256/EdDSA); reject alg:none and HS/symmetric"
    design_refs: [§A.8, §3.3, §7.3]
    description: "Tokens are signed with asymmetric keys only; no symmetric/HS fallback and no alg:none. The real issuer mints ES256 JWTs that verify with the EC public key; while the placeholder scaffold still exists it must be an OBVIOUS unsigned scaffold, never mistakable for a real (or symmetric) token."
    enforced_by: [internal/oidc:TestPlaceholderIssuerIsScaffoldNotReal, internal/oidc:TestJWTIssuerIsAsymmetric]

  - id: INV-PKCE-MANDATORY
    title: "PKCE S256 mandatory for every client; plain rejected"
    design_refs: [§A.8, §11.2, §11.7]
    description: "Every client must use PKCE with method S256; the plain method (and any non-S256 value) is rejected, and SHA256(code_verifier) must equal the stored code_challenge."
    enforced_by: [internal/oidc:TestValidateChallengeMethodRejectsNonS256, internal/oidc:TestVerifyChallengeMismatch]

  - id: INV-REDIRECT-EXACT
    title: "Exact redirect_uri match; never act on an unvalidated redirect"
    design_refs: [§A.8, §11.7]
    description: "The redirect_uri presented at /token must match the one bound to the authorization request EXACTLY (no prefix/substring/trailing-slash leniency); any mismatch collapses to invalid_grant."
    enforced_by: [internal/oidc:TestExactRedirectURIMatch]

  - id: INV-CODE-SINGLE-USE
    title: "Authorization codes are single-use / time-bounded; reuse => invalid_grant"
    design_refs: [§A.8, §3.5, §11.7]
    description: "An authorization code is valid for exactly one exchange within a short TTL; an expired (or already-consumed) code is rejected as invalid_grant. This test locks the pure-layer rejection of a non-live code; store-level consume-once is exercised by the service tests."
    enforced_by: [internal/oidc:TestAuthCodeSingleUse]

  - id: INV-INVALID-GRANT-GENERIC
    title: "Token failures collapse to invalid_grant; never leak which check failed"
    design_refs: [§A.8, §11.7]
    description: "Wrong client, wrong redirect_uri, expired code, and PKCE mismatch all return the SAME error code (invalid_grant), so the error channel never reveals which check failed (defeats enumeration)."
    enforced_by: [internal/oidc:TestTokenExchangeFailuresAllInvalidGrant]

  - id: INV-CONSTANT-TIME-COMPARE
    title: "Constant-time comparison for PKCE challenges (and codes/secrets/tokens)"
    design_refs: [§A.8, §11.7]
    description: "Secret-dependent comparisons (PKCE challenge, codes, tokens) use constant-time equality so a timing side-channel cannot leak the expected value; a mismatch yields ErrPKCEMismatch."
    enforced_by: [internal/oidc:TestVerifyChallengeUsesConstantTime]

  - id: INV-PPID-PAIRWISE-SECRET
    title: "Per-user pairwise secret; no global correlation secret; sectors are non-correlating"
    design_refs: [§A.8, §3.2]
    description: "The PPID (sub) is keyed by a PER-USER pairwise secret (not a global salt), and different RP sectors yield unrelated subs, so RPs cannot correlate a user across services and a single secret compromise deanonymizes only one user."
    enforced_by: [internal/identity:TestDerivePPIDDifferentSectorsUnrelated]

  - id: INV-DEK-FAIL-CLOSED
    title: "AES-256-GCM decryption fails closed; never returns partial plaintext on any failure"
    design_refs: [§A.8, §4.4]
    description: "Any GCM tag mismatch, short ciphertext, wrong AAD, or wrong key returns ErrDecryptFailed with nil plaintext. No partial output is ever emitted, defeating ciphertext-oracle attacks."
    enforced_by: [internal/crypto:TestDecryptFailClosed]

  - id: INV-DEK-REGION-ISOLATED
    title: "Per-region DEK wrapping: a DEK wrapped for region A cannot be unwrapped as region B"
    design_refs: [§4.4, §5.4]
    description: "The region string is bound as GCM AAD in WrapDEK/UnwrapDEK; a cross-region unwrap triggers GCM authentication failure and returns ErrDecryptFailed with a zero DEK."
    enforced_by: [internal/crypto:TestLocalKeyProviderRegionIsolation]

  - id: INV-DEK-CSPRNG
    title: "DEK generation and encryption use CSPRNG; GenerateDEK never returns the all-zero key"
    design_refs: [§4.4]
    description: "GenerateDEK reads from crypto/rand and rejects the all-zero output as defense-in-depth. Each Encrypt call draws a unique nonce so two encryptions of identical plaintext always differ."
    enforced_by: [internal/crypto:TestGenerateDEKNeverZero, internal/crypto:TestEncryptUniqueNonces]

  - id: INV-JWT-SUB-IS-PPID
    title: "JWT sub claim is always the PPID; never the raw user_id"
    design_refs: [§3.2, §3.3]
    description: "The sub claim in every issued JWT (ID token and access token) equals IssueParams.Subject (the PPID), never a raw database user_id, so an RP can never correlate the subject back to a global identity."
    enforced_by: [internal/oidc:TestJWTIssuerSubIsPPID]

  - id: INV-JWKS-KID-MATCH
    title: "Issued token kid resolves to exactly one JWKS key that verifies the token"
    design_refs: [§7.3, §3.3]
    description: "The kid header of an issued token matches exactly one key in the published JWKS, and that key verifies the token's ES256 signature — the offline-verifiability contract RPs depend on."
    enforced_by: [internal/oidc:TestJWTIssuerKidMatchesJWKS, internal/oidc:TestJWTGoldenVectors]

  - id: INV-JWT-NO-PII
    title: "JWT claim set contains no PII beyond consented scopes; no email/name without consent"
    design_refs: [§3.2, §6.5]
    description: "Issued JWT payloads contain only allowed claims (iss, sub, aud, exp, iat, nonce, scope, jti). No email, name, or other profile field appears without consent, upholding the data-minimization thesis."
    enforced_by: [internal/oidc:TestJWTIssuerNoPII]

  - id: INV-GRANT-ACTIVE-ONLY
    title: "FindGrant returns only active (non-revoked) grants; revoked grants are invisible"
    design_refs: [§10, §11.3]
    description: "A revoked consent grant must never be returned by FindGrant. The UNIQUE index on (user_id, client_id) means revoking and re-consenting issues a new grant; the old revoked row stays for audit but is excluded from the active lookup."
    enforced_by: [internal/clients:TestDBGrantStoreActiveOnlyAfterRevoke]

  - id: INV-GRANT-PPID-BOUND
    title: "Grant pairwise_sub is the PPID frozen at consent time; never mutated after creation"
    design_refs: [§3.2, §10, §11.3]
    description: "The pairwise_sub stored in a consent grant is the PPID computed at the moment of consent and is immutable — reads always return the exact value supplied at CreateGrant time. This ensures RP tokens stay stable even if the PPID derivation inputs change."
    enforced_by: [internal/clients:TestDBGrantStorePPIDBound]

  - id: INV-SESSION-PPID-STABLE
    title: "Per-RP PPID is stable across multiple Resolve calls for the same (user, client) pair"
    design_refs: [§3.2, §11.2]
    description: "After the first consent the grant's frozen pairwise_sub is returned on every subsequent Resolve — re-deriving DerivePPID with a mutated secret would break existing sessions. Proven by resolving twice and asserting sub1 == sub2."
    enforced_by: [internal/oidc:TestPPIDSessionResolverStableSubject]

  - id: INV-SESSION-PPID-UNLINKABLE
    title: "Different sector_ids produce different PPIDs for the same user; cross-RP correlation is impossible"
    design_refs: [§3.2, §6.5]
    description: "DerivePPID(secret, sector_id, user_id) is injective in sector_id: subA (sector rp-a.example.com) != subB (sector rp-b.example.com) for the same user. An RP cannot correlate a user across tenants."
    enforced_by: [internal/oidc:TestPPIDSessionResolverUnlinkability]

  - id: INV-SESSION-PPID-NO-RAW-UID
    title: "Raw user_id is never returned as the subject on any error path; resolver fails closed"
    design_refs: [§3.2, §11.7]
    description: "If auth, secret-load, or derivation fails, Resolve returns an empty subject and a non-nil error — never the internal user_id as sub. Leaking user_id as sub would collapse cross-RP unlinkability for any RP that receives the error response."
    enforced_by: [internal/oidc:TestPPIDSessionResolverFailClosed]

  - id: INV-REFRESH-HASH-AT-REST
    title: "Refresh token stored only as SHA-256 hash; plaintext is never persisted"
    design_refs: [§3.5, §7.4]
    description: "The hash returned by hashRefreshToken(plaintext) differs from the plaintext in both content and length. A database compromise leaks only the hash — the attacker cannot reconstruct the presentable token without inverting SHA-256."
    enforced_by: [internal/oidc:TestRefreshHashAtRest]

  - id: INV-REFRESH-HASH-LOOKUP
    title: "Token lookup uses SHA-256(plaintext); presenting the stored hash as a token returns invalid_grant"
    design_refs: [§3.5, §7.4]
    description: "The store is keyed on sha256(plaintext). An attacker with only DB read access holds base64url(hash) — presenting it as the token causes the service to compute sha256(hash) ≠ original hash, so the lookup misses and returns invalid_grant. DB compromise does not enable token replay."
    enforced_by: [internal/oidc:TestRefreshHashLookup]

  - id: INV-REFRESH-EXPIRY-ENFORCED
    title: "Expired refresh tokens are rejected as invalid_grant; TTL is hard-enforced"
    design_refs: [§3.5, §11.7]
    description: "A refresh token whose ExpiresAt is in the past is rejected with invalid_grant at both the service layer (GetSessionByTokenHash returns ErrRefreshTokenNotFound) and the HTTP /token layer. A NULL expires_at also fails closed per the DB store — it is never treated as non-expiring."
    enforced_by: [internal/oidc:TestRefreshExpiredTokenRejected, internal/oidcapi:TestToken_RefreshExpiredTokenRejected, internal/clients:TestDBSessionStoreGetByTokenHash]

  - id: INV-REFRESH-ROTATION-INVALIDATES-OLD
    title: "A rotated refresh token is immediately invalidated; the old token cannot be reused"
    design_refs: [§3.5, §11.7]
    description: "After a successful Refresh(), the old session is tombstoned (revoked_at set). Presenting the old token again returns invalid_grant — the hash lookup still finds the row but the revoked check fires, preventing replay."
    enforced_by: [internal/oidc:TestRefreshRotationInvalidatesOldToken, internal/oidcapi:TestToken_RefreshInvalidatesOldToken]

  - id: INV-REFRESH-ROTATION-SINGLE-USE
    title: "Refresh token is single-use at the HTTP layer; replaying a rotated token returns invalid_grant"
    design_refs: [§3.5, §11.7]
    description: "End-to-end conformance at the /token HTTP layer: after a successful refresh_token grant the old token is rotated and any subsequent use of the same token returns invalid_grant. Complements INV-REFRESH-ROTATION-INVALIDATES-OLD (pure-layer) with a full authorize → code exchange → refresh → replay cycle."
    enforced_by: [internal/oidcapi:TestToken_RefreshRotation]

  - id: INV-REFRESH-THEFT-SIGNAL-FAMILY-REVOKE
    title: "Replay of a rotated token fires theft signal that revokes the entire (user, client) session family"
    design_refs: [§3.5, §11.7]
    description: "When a revoked refresh token is presented, ErrRefreshTokenRevoked is detected and RevokeSessionsByUserClient is called, invalidating every active session for that (user, client) pair — including the legitimately rotated successor token. This detects token theft and forces re-authentication. A revoke-side DB failure must NOT become a 5xx or allow the replayed token to succeed."
    enforced_by: [internal/oidc:TestRefreshReuseFiresTheftSignal, internal/oidcapi:TestToken_RefreshTheftSignal_RevokesFamily, internal/clients:TestDBSessionStoreGetByTokenHash_RevokedAndExpired, internal/oidc:TestChaos_Refresh_FamilyRevokeFails_StillInvalidGrant]

  - id: INV-ENROLL-DEK-FRESH
    title: "Each enrollment generates a fresh DEK; keys are never reused across users"
    design_refs: [§4.4, §10]
    description: "Two consecutive enrollments yield distinct wrapped DEKs and distinct encrypted pairwise secrets. A DEK collision would mean two users share a decryption key — a catastrophic privacy failure."
    enforced_by: [internal/identity:TestEnrollDifferentUsers]

  - id: INV-ENROLL-PAIRWISE-SECRET-ENCRYPTED
    title: "Pairwise secret stored envelope-encrypted with user DEK; never stored as plaintext"
    design_refs: [§4.4, §10]
    description: "The pairwise_secret persisted to users.pairwise_secret is AES-256-GCM ciphertext (nonce+ct+tag ≥60 bytes for a 32-byte input). A stored value of exactly 32 bytes would indicate a plaintext leak."
    enforced_by: [internal/identity:TestEnrollPairwiseSecretEncrypted]

  - id: INV-ENROLL-REGION-BOUND
    title: "DEK wrapped for enrollment region; cross-region unwrap is rejected by GCM"
    design_refs: [§4.4, §5.4, §10]
    description: "A DEK generated at enrollment is wrapped under the regional KEK with region-bound GCM AAD. Unwrapping the same wrapped blob with a different region returns ErrDecryptFailed — the GCM tag cannot authenticate."
    enforced_by: [internal/identity:TestEnrollRegionBound]

  - id: INV-DB-ERROR-NOT-MASKED
    title: "Transient DB errors propagate as 5xx; never silently masked as invalid_grant or ErrRefreshTokenNotFound"
    design_refs: [§10, §11.7]
    description: "A transient DB error (connection reset, timeout, etc.) on a session lookup must propagate to the caller so the HTTP layer returns server_error, not silently collapse to invalid_grant / ErrRefreshTokenNotFound. Masking a DB outage as a client error would reject valid refresh tokens and trigger a mass logout for the duration of the outage."
    enforced_by: [internal/clients:TestDBSessionStoreGetByTokenHash_DBError, internal/oidc:TestChaos_Refresh_SessionLookupDBError]

  - id: INV-REFRESH-CONSENT-REVOKED
    title: "Refresh after consent revocation returns invalid_grant (not server_error)"
    design_refs: [§3.5, §10, §11.7]
    description: "When FindGrant returns (Grant{}, false, nil) the authorization has been permanently revoked by the user. This must return invalid_grant (RFC 6749 §5.2) so well-behaved clients re-initiate consent rather than retrying indefinitely. Returning server_error for a permanently-gone grant would cause infinite retries and the user could never re-authenticate."
    enforced_by: [internal/oidc:TestRefreshConsentRevoked, internal/clients:TestDBGrantStoreActiveOnlyAfterRevoke]

  - id: INV-REFRESH-LOCKOUT-PREVENTION
    title: "Pre-rotation failures leave the old refresh token valid; no lock-out hazard"
    design_refs: [§3.5, §11.7]
    description: "FindGrant (Step A), tokens.Issue (Step B), and new-session-ID generation (Step C) are all called BEFORE RotateSession (Step D — the single commit point). A failure in A, B, or C returns server_error without revoking the existing session, so the client can retry with the same refresh token once the dependency recovers. After RotateSession no fallible operations remain. A failure in Step D (RotateSession) is also handled: RotateSession is atomic — either both the old revocation and new session exist, or neither, so the client can still retry. Note: the newOpaqueToken() call at the start of Step C shares the same pre-rotation guarantee but cannot be independently fault-injected without refactoring (crypto/rand.Read is not injectable)."
    enforced_by: [internal/oidc:TestChaos_Refresh_GrantLookupFails_PreRotation, internal/oidc:TestChaos_Refresh_TokenSigningFails_PreRotation, internal/oidc:TestChaos_Refresh_RotationFails, internal/oidc:TestChaos_Refresh_NewSessionIDFails_PreRotation]
