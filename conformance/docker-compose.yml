# Harbor — OIDF conformance: the OP UNDER TEST (harbor-hot).
#
# This compose file stands up ONLY harbor-hot (the issuer the OpenID Foundation
# conformance suite drives as a client). The OIDF suite itself (mongodb + server
# + nginx on :8443) is a heavy external dependency and is brought up separately
# by conformance/run-plan.sh (prebuilt image, else a pinned clone) — it is NOT
# vendored here. run-plan.sh owns the full lifecycle (up → run-test-plan → down).
#
# NETWORKING (the crux): the suite runs in Docker and must reach harbor-hot AND
# see a discovery document whose endpoints it can also reach. So harbor-hot's
# ISSUER is `http://host.docker.internal:8080` (NOT localhost): the suite reaches
# the host-published :8080 via host.docker.internal, and discovery then advertises
# the SAME host so authorize/token/JWKS are reachable from inside the suite. On
# Linux (CI) the SUITE container needs `host.docker.internal` wired to the host
# gateway — run-plan.sh adds that `extra_hosts` mapping to the suite container it
# starts. harbor-hot itself only publishes :8080 and does not need the mapping.
#
# harbor-hot runs in HARBOR_DEV_MODE here (no DB/Redis required): the stub
# session resolver auto-approves /authorize, and the real ES256 signing stack
# (in-process DB-backed ECDSA key, signingkeys store) issues genuine JWTs.
# The OIDF OP suite will stay RED on tests that require unimplemented features
# (pairwise subjects, prompt=none, etc.) — that is the honest gate.
services:
  harbor-hot:
    image: golang:1.26
    working_dir: /src
    command: ["go", "run", "./cmd/harbor-hot"]
    environment:
      PORT: "8080"
      # Issuer MUST match how the suite reaches harbor-hot (see NETWORKING note).
      ISSUER: "http://host.docker.internal:8080"
      # REGION is required: binds the issuer host to a region at boot so the
      # fail-closed region middleware resolves /authorize and /token instead of
      # 400-rejecting them (region.BindIssuerHost). host.docker.internal is not in
      # the default *.harbor.id host map, so an explicit binding is needed.
      REGION: "EU"
      # Dev mode bypasses the fail-closed startup guard (validateProductionReadiness)
      # so the OIDF suite can drive the flow without DATABASE_URL/REDIS_URL/LOGIN_URL.
      # The stub session resolver auto-approves /authorize — required for the suite
      # to obtain codes without a real login UI. The signing stack is still real
      # (in-process ECDSA key) in dev mode.
      HARBOR_DEV_MODE: "1"
    ports:
      - "8080:8080"
    volumes:
      # Mount the repo read-only; go run compiles from source inside the pinned
      # golang image so the conformance run needs no local Go toolchain.
      - ..:/src:ro
    # Same /healthz contract as e2e/docker-compose.yml, so `up -d --wait` blocks
    # until harbor-hot is READY. start_period covers the cold `go run` compile so
    # early (pre-ready) failures don't count against retries.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 120s
