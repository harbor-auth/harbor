# Harbor — CD: build & publish the runtime images, then pin them for GitOps.
#
# On every push to main that touches Go/Docker sources, this builds the two
# runtime binaries into images and pushes them to GHCR under
# ghcr.io/harbor-auth/harbor/{harbor-hot,harbor-mgmt}, tagged with both the
# immutable 12-char commit SHA and the moving `latest` tag.
#
# It then pins deploy/argocd/values-prod.yaml's global.image.tag to that SHA and
# commits the change back to main with [skip ci]. ArgoCD watches the repo, sees
# the values change, and runs `helm upgrade` — so a push to main deploys itself
# without any imperative kubectl/helm step. The [skip ci] marker (plus the paths
# filter below, which excludes the values file) prevents the config commit from
# re-triggering this workflow.
#
# GITHUB_TOKEN needs `packages: write` to push to GHCR and `contents: write` to
# commit the pinned tag back to main. If branch protection blocks the bot push,
# swap the checkout/login token for a PAT with those scopes.
name: publish

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'deploy/Dockerfile.hot'
      - 'deploy/Dockerfile.mgmt'
      - 'deploy/Dockerfile.migrate'
      - 'db/migrations/**'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io/harbor-auth/harbor

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push harbor-hot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.hot
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/harbor-hot:${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/harbor-hot:latest
          cache-from: type=gha,scope=harbor-hot
          cache-to: type=gha,scope=harbor-hot,mode=max

      - name: Build & push harbor-mgmt
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.mgmt
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/harbor-mgmt:${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/harbor-mgmt:latest
          cache-from: type=gha,scope=harbor-mgmt
          cache-to: type=gha,scope=harbor-mgmt,mode=max

      # DB-migration runner image: golang-migrate + the embedded db/migrations
      # SQL. Consumed by the pre-install/pre-upgrade hook Job in the Helm chart,
      # tagged with the same immutable SHA so schema and binaries deploy in
      # lockstep.
      - name: Build & push harbor-migrate
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.migrate
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/harbor-migrate:${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/harbor-migrate:latest
          cache-from: type=gha,scope=harbor-migrate
          cache-to: type=gha,scope=harbor-migrate,mode=max

      # Pin the just-built immutable SHA into the ArgoCD prod values file. yq
      # (mikefarah) is preinstalled on ubuntu-latest; env(SHA) reads the env var
      # so the value isn't shell-interpolated into the expression.
      - name: Pin image tag in values-prod.yaml
        env:
          SHA: ${{ steps.sha.outputs.short }}
        run: yq -i '.global.image.tag = env(SHA)' deploy/argocd/values-prod.yaml

      # Commit the pinned tag back to main for ArgoCD. [skip ci] + the paths
      # filter (which excludes deploy/argocd/**) keep this from looping.
      - name: Commit pinned tag
        env:
          SHA: ${{ steps.sha.outputs.short }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/argocd/values-prod.yaml
          if git diff --staged --quiet; then
            echo "Image tag already pinned to ${SHA}; nothing to commit."
          else
            git commit -m "chore(deploy): pin image tag to ${SHA} [skip ci]"
            git pull --rebase origin main
            git push
          fi

      # Make both container packages public so RKE2 can pull them without a
      # pull secret. GITHUB_TOKEN cannot change package visibility (GitHub
      # limitation), so this step uses GH_TOKEN — a classic PAT with the
      # `write:packages` scope stored as a repository secret. Create it once:
      #   GitHub → Settings → Developer settings → Personal access tokens
      #   (classic) → New → scope: write:packages → copy → repo Settings →
      #   Secrets → Actions → New secret → name: GH_TOKEN → paste.
      # The step is non-fatal (|| true) so the workflow succeeds even if the
      # secret is not yet configured.
      - name: Set packages visibility to public
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          for pkg in harbor-hot harbor-mgmt harbor-migrate; do
            echo "Setting ghcr.io/harbor-auth/harbor/${pkg} to public..."
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/orgs/harbor-auth/packages/container/harbor%2F${pkg}" \
              -f visibility=public \
              && echo "  ✓ ${pkg} is now public" \
              || echo "  ⚠ Could not set ${pkg} to public (GH_TOKEN missing or lacks write:packages?)"
          done
