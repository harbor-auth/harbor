# Harbor — Spectral OpenAPI linting config (@validate / spec-lint CI step).
#
# Auto-discovered by `spectral lint` when run from the repo root. The OAS
# ruleset is loaded via CDN so `npx @stoplight/spectral-cli` needs no extra
# npm packages installed alongside it.
extends:
  - "https://unpkg.com/@stoplight/spectral-oas@6.11.1/dist/ruleset.cjs"
